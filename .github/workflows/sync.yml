name: Sync Fork

on:
  schedule:
    - cron: '17 4 * * 0' # Runs every Sunday at 4:17 AM UTC.
  workflow_dispatch: # Allows you to run this workflow manually from the Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Set fetch-depth to 0 to fetch all history for all branches and tags.
          # This is necessary for merging histories.
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Git
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/umami-software/umami.git || true
          git remote set-url upstream https://github.com/umami-software/umami.git

      - name: Fetch upstream changes
        run: |
          git fetch upstream
          git fetch origin

      - name: Check if merge is needed
        id: check-merge
        run: |
          git checkout master
          UPSTREAM_COMMITS=$(git rev-list --count HEAD..upstream/master)
          echo "upstream-commits=$UPSTREAM_COMMITS" >> $GITHUB_OUTPUT
          if [ "${UPSTREAM_COMMITS:-0}" -eq 0 ]; then
            echo "no-merge-needed=true" >> $GITHUB_OUTPUT
            echo "No new commits to merge"
          else
            echo "no-merge-needed=false" >> $GITHUB_OUTPUT
            echo "Found $UPSTREAM_COMMITS new commits to merge"
          fi

      - name: Merge upstream changes
        if: steps.check-merge.outputs.no-merge-needed == 'false'
        run: |
          # Keep fork-local workflows unchanged to avoid push rejection for workflow updates.
          if ! git merge upstream/master --no-ff --no-edit --no-commit; then
            echo "Merge conflict detected, aborting merge"
            git merge --abort
            exit 1
          fi

          # Drop upstream changes to workflow files before committing.
          if git diff --name-only --cached -- '.github/workflows/*' | grep -q .; then
            git restore --source=HEAD --staged --worktree '.github/workflows'
          fi

          # If nothing remains after filtering workflow files, stop gracefully.
          if git diff --cached --quiet; then
            echo "No syncable changes remain after excluding workflow files"
            echo "no-merge-needed=true" >> $GITHUB_OUTPUT
          else
            git commit --no-edit
          fi

      - name: Push changes
        if: steps.check-merge.outputs.no-merge-needed == 'false'
        run: |
          git push origin master 